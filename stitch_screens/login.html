<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "primary": "#3780f6",
              "background-light": "#f5f7f8",
              "background-dark": "#101722",
            },
            fontFamily: {
              "display": ["Inter"]
            },
            borderRadius: {"DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px"},
          },
        },
      }

<title>Login | SaaS Platform</title>
</head>
<body class="font-display bg-background-light dark:bg-background-dark min-h-screen flex flex-col items-center justify-center relative overflow-hidden">
<!-- Abstract Background Shapes -->
<div class="absolute top-0 left-0 w-full h-full overflow-hidden pointer-events-none -z-10">
<div class="absolute -top-24 -left-24 w-96 h-96 bg-primary/10 rounded-full blur-3xl"></div>
<div class="absolute top-1/2 -right-24 w-80 h-80 bg-primary/5 rounded-full blur-3xl"></div>
<div class="absolute -bottom-24 left-1/3 w-64 h-64 bg-primary/10 rounded-full blur-3xl"></div>
</div>
<!-- Login Container -->
<div class="w-full max-w-[440px] px-6">
<!-- Logo Section -->
<div class="flex flex-col items-center mb-8">
<div class="bg-primary p-3 rounded-xl shadow-lg shadow-primary/20 mb-4">
<svg class="w-8 h-8 text-white" fill="none" viewbox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">

</div>
<h1 class="text-3xl font-bold text-slate-900 dark:text-slate-100 mb-2">Welcome Back</h1>
<p class="text-slate-500 dark:text-slate-400">Please enter your details to sign in.</p>
</div>
<!-- Auth Card -->
<div class="bg-white dark:bg-slate-900/50 backdrop-blur-sm border border-slate-200 dark:border-slate-800 rounded-xl p-8 shadow-xl shadow-slate-200/50 dark:shadow-none">
<form action="#" class="space-y-6" method="POST">
<!-- Email Input -->
<div class="space-y-2">
<label class="text-sm font-medium text-slate-700 dark:text-slate-300 ml-1" for="email">Email address</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-slate-400 group-focus-within:text-primary transition-colors text-[20px]">mail</span>
</div>
<input class="block w-full pl-11 pr-4 py-3.5 bg-slate-50 dark:bg-slate-800/50 border border-slate-200 dark:border-slate-700 rounded-lg text-slate-900 dark:text-white placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all duration-200" id="email" name="email" placeholder="name@company.com" required="" type="email"/>
</div>
</div>
<!-- Password Input -->
<div class="space-y-2">
<div class="flex justify-between items-center ml-1">
<label class="text-sm font-medium text-slate-700 dark:text-slate-300" for="password">Password</label>
<a class="text-xs font-semibold text-primary hover:text-primary/80 transition-colors" href="#">Forgot Password?</a>
</div>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-slate-400 group-focus-within:text-primary transition-colors text-[20px]">lock</span>
</div>
<input class="block w-full pl-11 pr-11 py-3.5 bg-slate-50 dark:bg-slate-800/50 border border-slate-200 dark:border-slate-700 rounded-lg text-slate-900 dark:text-white placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all duration-200" id="password" name="password" placeholder="••••••••" required="" type="password"/>
<div class="absolute inset-y-0 right-0 pr-4 flex items-center cursor-pointer">
<span class="material-symbols-outlined text-slate-400 hover:text-slate-600 dark:hover:text-slate-200 transition-colors text-[20px]">visibility</span>
</div>
</div>
</div>
<!-- Remember Me -->
<div class="flex items-center">
<input class="h-4 w-4 text-primary focus:ring-primary border-slate-300 rounded" id="remember-me" name="remember-me" type="checkbox"/>
<label class="ml-2 block text-sm text-slate-600 dark:text-slate-400" for="remember-me">
                        Remember me for 30 days
                    </label>
</div>
<!-- Login Button -->
<button class="w-full flex justify-center py-3.5 px-4 border border-transparent rounded-lg shadow-sm text-sm font-semibold text-white bg-primary hover:bg-primary/90 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary transition-all duration-200 transform active:scale-[0.98]" type="submit">
                    Login
                </button>
</form>
<!-- Divider -->
<!-- Social Login -->
</div>
<!-- Footer Text -->
<p class="mt-8 text-center text-sm text-slate-600 dark:text-slate-400">
            Don’t have an account? 
            <a class="font-semibold text-primary hover:text-primary/80 transition-colors underline-offset-4 hover:underline" href="#">Sign Up</a>
</p>
<!-- Terms -->
<div class="mt-12 text-center">
<p class="text-xs text-slate-400 dark:text-slate-500 uppercase tracking-widest font-medium">
                © 2024 SaaS Platform Inc.
            </p>
<div class="flex justify-center space-x-4 mt-2">
<a class="text-xs text-slate-400 hover:text-primary transition-colors" href="#">Privacy Policy</a>
<span class="text-slate-300 dark:text-slate-800">•</span>
<a class="text-xs text-slate-400 hover:text-primary transition-colors" href="#">Terms of Service</a>
</div>
</div>
</div>
</body></html>
