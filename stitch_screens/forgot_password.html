<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#3780f6",
                        "background-light": "#f5f7f8",
                        "background-dark": "#101722",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.5rem",
                        "lg": "1rem",
                        "xl": "1.5rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Inter', sans-serif;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark min-h-screen flex items-center justify-center p-4">
<div class="w-full max-w-[480px]">
<!-- Logo Section -->
<div class="flex justify-center mb-8">
<div class="h-12 w-12 bg-primary rounded-xl flex items-center justify-center text-white">
<span class="material-symbols-outlined text-3xl">shield_lock</span>
</div>
</div>
<!-- Auth Card -->
<div class="bg-white dark:bg-slate-900 rounded-xl shadow-sm border border-slate-200 dark:border-slate-800 p-8 md:p-10">
<div class="flex flex-col gap-2 mb-8 text-center">
<h2 class="text-slate-900 dark:text-slate-100 text-3xl font-bold tracking-tight">Reset Password</h2>
<p class="text-slate-500 dark:text-slate-400 text-base leading-relaxed">
                    Enter the email address associated with your account and we'll send you a link to reset your password.
                </p>
</div>
<form action="#" class="flex flex-col gap-6" method="POST">
<!-- Email Input Group -->
<div class="flex flex-col gap-2">
<label class="text-slate-700 dark:text-slate-300 text-sm font-semibold" for="email">Email Address</label>
<div class="relative flex items-center">
<div class="absolute left-4 text-slate-400 dark:text-slate-500">
<span class="material-symbols-outlined text-[20px]">mail</span>
</div>
<input class="w-full h-14 pl-12 pr-4 rounded-xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 text-slate-900 dark:text-slate-100 placeholder:text-slate-400 focus:border-primary focus:ring-2 focus:ring-primary/20 transition-all outline-none" id="email" name="email" placeholder="name@company.com" type="email"/>
</div>
</div>
<!-- Submit Button -->
<button class="w-full h-14 bg-primary hover:bg-primary/90 text-white rounded-xl font-bold text-base transition-colors shadow-lg shadow-primary/20 flex items-center justify-center gap-2 group" type="submit">
<span>Send Reset Link</span>
<span class="material-symbols-outlined text-[20px] group-hover:translate-x-1 transition-transform">arrow_forward</span>
</button>
</form>
<!-- Footer Link -->
<div class="mt-8 pt-6 border-t border-slate-100 dark:border-slate-800 text-center">
<a class="inline-flex items-center gap-2 text-slate-500 dark:text-slate-400 hover:text-primary dark:hover:text-primary font-medium text-sm transition-colors group" href="#">
<span class="material-symbols-outlined text-[18px]">arrow_back</span>
                    Back to Login
                </a>
</div>
</div>
<!-- System Status/Help (Optional) -->
<p class="text-center mt-8 text-slate-400 dark:text-slate-500 text-xs">
            © 2024 SaaS Platform. All rights reserved. 
            <br/>
            Having trouble? <a class="underline hover:text-primary transition-colors" href="#">Contact Support</a>
</p>
</div>
</body></html>
